<svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg" role="img" opacity="0.08">
  <title>OracleMK1 Shockwave Logo</title>
  <desc>A hexagonal geometric design inspired by Shockwave from Transformers, featuring a glowing red optic core and purple geometric framing for the OracleMK1 clinical AI system.</desc>
  
  <!-- Outer hexagon frame (purple, clean geometric) -->
  <g opacity="0.8">
    <polygon points="50,25 100,10 150,25 165,75 150,125 100,140 50,125 35,75" 
             fill="none" stroke="#7C3AED" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="50,25 100,10 150,25 165,75 150,125 100,140 50,125 35,75" 
             fill="none" stroke="#6D28D9" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>
  </g>
  
  <!-- Inner geometric chamber (dark gray, metallic feel) -->
  <polygon points="60,40 100,28 140,40 155,75 140,110 100,122 60,110 45,75" 
           fill="#2D2D2D" opacity="0.7" stroke="#4A4A4A" stroke-width="1"/>
  
  <!-- Corner accent lines -->
  <line x1="60" y1="40" x2="75" y2="55" stroke="#7C3AED" stroke-width="1.2" opacity="0.5"/>
  <line x1="140" y1="40" x2="125" y2="55" stroke="#7C3AED" stroke-width="1.2" opacity="0.5"/>
  <line x1="60" y1="110" x2="75" y2="95" stroke="#7C3AED" stroke-width="1.2" opacity="0.5"/>
  <line x1="140" y1="110" x2="125" y2="95" stroke="#7C3AED" stroke-width="1.2" opacity="0.5"/>
  
  <!-- Central optic core -->
  <circle cx="100" cy="75" r="22" fill="none" stroke="#FF4500" stroke-width="2.5" opacity="0.6"/>
  <circle cx="100" cy="75" r="18" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.7"/>
  <circle cx="100" cy="75" r="14" fill="#FF2D00" opacity="0.85"/>
  <circle cx="100" cy="75" r="8" fill="#FFB000" opacity="0.9"/>
  
  <!-- Optic lens highlight -->
  <ellipse cx="96" cy="70" rx="4" ry="5" fill="#FFF8E7" opacity="0.7"/>
  
  <!-- Geometric data lines -->
  <line x1="100" y1="50" x2="100" y2="42" stroke="#FF4500" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="100" x2="100" y2="108" stroke="#FF4500" stroke-width="1.5" opacity="0.5"/>
  <line x1="75" y1="75" x2="65" y2="75" stroke="#FF4500" stroke-width="1.5" opacity="0.5"/>
  <line x1="125" y1="75" x2="135" y2="75" stroke="#FF4500" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Subtle hexagonal grid pattern -->
  <g stroke="#7C3AED" stroke-width="0.5" opacity="0.25" fill="none">
    <polygon points="85,60 100,52 115,60 115,80 100,88 85,80"/>
    <polygon points="85,70 100,62 115,70 115,90 100,98 85,90"/>
  </g>
</svg>
